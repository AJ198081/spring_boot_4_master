spring:
  docker:
    compose:
      enabled: true
      skip:
        in-tests: false
      lifecycle-management: start_only

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: trace
    sql: debug

