
# https://docs.hibernate.org/orm/6.2/javadocs/constant-values.html#org.hibernate.cfg.AvailableSettings.GENERATE_STATISTICS
spring.jpa.properties.hibernate.generate_statistics=true
#Ctrl click on the spring.jpa.properties to see the available properties
spring.jpa.properties.org.hibernate.stat=DEBUG
spring.jpa.properties.hibernate.show_sql=true

spring.jpa.properties.hibernate.format_sql=true

