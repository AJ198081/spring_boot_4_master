services:
  postgres:
    image: 'postgres:latest'
    container_name: '@shipping.service.postgres.name@'
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
      - 'POSTGRES_PORT=@shipping.service.postgres.port@'
    ports:
      - '${POSTGRES_PORT}:5432'
